<div class="report-wrapper">
<div class="report-card">
<div class="max-w-xl mx-auto p-10">

<h2 class="text-2xl font-black mb-6">
New Submission
</h2>

<input
[(ngModel)]="title"
placeholder="Subject"
class="w-full border rounded-xl px-5 py-4 mb-4">

<select
required
[(ngModel)]="category">

<option value="">Select Category</option>
<option>Academic</option>
<option>Hostel</option>
<option>Examination</option>
<option>Infrastructure</option>
<option>Other</option>

</select>

<textarea
[(ngModel)]="description"
rows="5"
placeholder="Details"
class="w-full border rounded-xl px-5 py-4 mb-4">
</textarea>

<input
type="file"
(change)="onFileSelect($event)">

<button
class="report-submit-btn"
(click)="submit()">
Submit
</button>

</div>
</div>
</div>
